[build]
command = "npm run build"
publish = "dist/client"

[build.environment]
NODE_VERSION = "22"

[functions]
directory = "netlify/functions"

# Redirect all requests to SSR, but allow existing static files to be served
[[redirects]]
from = "/*"
to = "/.netlify/functions/ssr"
status = 200
force = false

[context.production.environment]
SITE_URL = "https://org-comms-pwa.netlify.app"

[context.deploy-preview.environment]
SITE_URL = "https://deploy-preview--org-comms-pwa.netlify.app"
