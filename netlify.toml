[build]
command = "npm run build"
publish = "dist/client"

[build.environment]
NODE_VERSION = "22"

[functions]
directory = "netlify/functions"

# Explicit redirect for assets - MUST come before catch-all
[[redirects]]
from = "/assets/*"
to = "/assets/:splat"
status = 200

# Other static files
[[redirects]]
from = "/favicon.ico"
to = "/favicon.ico"
status = 200

[[redirects]]
from = "/manifest.json"
to = "/manifest.json"
status = 200

[[redirects]]
from = "/sw.js"
to = "/sw.js"
status = 200

[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200

[[redirects]]
from = "/icon-*.png"
to = "/icon-:splat.png"
status = 200

[[redirects]]
from = "/apple-touch-icon.png"
to = "/apple-touch-icon.png"
status = 200

[[redirects]]
from = "/favicon-*.png"
to = "/favicon-:splat.png"
status = 200

[[redirects]]
from = "/android-chrome-*.png"
to = "/android-chrome-:splat.png"
status = 200

# Catch-all for SSR
[[redirects]]
from = "/*"
to = "/.netlify/functions/ssr"
status = 200

[context.production.environment]
SITE_URL = "https://org-comms-pwa.netlify.app"

[context.deploy-preview.environment]
SITE_URL = "https://deploy-preview--org-comms-pwa.netlify.app"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
