[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200

[context.production.environment]
  SITE_URL = "https://org-comms-pwa.netlify.app"

[context.deploy-preview.environment]
  SITE_URL = "https://deploy-preview--org-comms-pwa.netlify.app"
